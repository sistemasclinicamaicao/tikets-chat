# Nginx para imagen solo front (EasyPanel / Dockerfile.web): sin proxy a `api`.
# El navegador llama al API y Socket.IO vía VITE_API_ORIGIN (URL absoluta en el bundle).
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /favicon.ico {
    alias /usr/share/nginx/html/favicon.svg;
    default_type image/svg+xml;
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
