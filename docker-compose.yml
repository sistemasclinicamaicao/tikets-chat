# Stack listo para producción / EasyPanel (clonar repo y usar este archivo desde la raíz).
# Variables: copiar .env.easypanel.example → .env.easypanel (o definirlas en el panel).
#
# Uso local:
#   docker compose --env-file .env.easypanel up -d --build
#
# Equivalente histórico (mismos servicios, otras rutas relativas al archivo):
#   infrastructure/compose/docker-compose.easypanel.yml

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN}
    container_name: chat_tikets_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - app_net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: chat_tikets_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3030
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_DEFAULT_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      INTEGRATIONS_ENCRYPTION_KEY: ${INTEGRATIONS_ENCRYPTION_KEY}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      NOTIFY_CHAT_EMAIL: ${NOTIFY_CHAT_EMAIL:-true}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3030/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    container_name: chat_tikets_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  redis:
    image: redis:7.2-alpine
    container_name: chat_tikets_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    container_name: chat_tikets_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

  minio_init:
    image: minio/mc:latest
    container_name: chat_tikets_minio_init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET};
      mc anonymous set none local/${MINIO_DEFAULT_BUCKET};
      echo 'MinIO bucket ready';
      "
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
