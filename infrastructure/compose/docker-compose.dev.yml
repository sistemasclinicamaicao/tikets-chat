version: "3.9"

# ─── NETWORKS ────────────────────────────────────────────────────────────────
networks:
  helpdesk_net:
    driver: bridge

# ─── VOLUMES ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:

# ─── SERVICES ────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helpdesk}
      POSTGRES_USER: ${POSTGRES_USER:-helpdesk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helpdesk_user} -d ${POSTGRES_DB:-helpdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: helpdesk_redis_dev
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: helpdesk_minio_dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO bucket init ─────────────────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: helpdesk_minio_init_dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-changeme_minio_password};
        mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET:-helpdesk-files};
        mc anonymous set none local/${MINIO_DEFAULT_BUCKET:-helpdesk-files};
        echo 'MinIO bucket ready.';
      "
    networks:
      - helpdesk_net

  # ── n8n ───────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: helpdesk_n8n_dev
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: http
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme_n8n_password}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme_n8n_encryption_key}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-helpdesk}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-helpdesk_user}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      DB_POSTGRESDB_SCHEMA: n8n
      GENERIC_TIMEZONE: America/Bogota
      WEBHOOK_URL: http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - helpdesk_net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx (reverse proxy dev) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: helpdesk_nginx_dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - helpdesk_net
    depends_on:
      - postgres
      - redis
      - minio
