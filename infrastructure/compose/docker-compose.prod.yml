version: "3.9"

# ─── NETWORKS ────────────────────────────────────────────────────────────────
networks:
  helpdesk_net:
    driver: bridge

# ─── VOLUMES ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:
  nginx_certs:

# ─── SERVICES ────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: helpdesk_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: helpdesk_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${APP_URL}/minio-console
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      - helpdesk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── MinIO bucket init ─────────────────────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: helpdesk_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET};
        mc anonymous set none local/${MINIO_DEFAULT_BUCKET};
        echo 'MinIO bucket ready.';
      "
    networks:
      - helpdesk_net

  # ── n8n ───────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: helpdesk_n8n
    restart: always
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      GENERIC_TIMEZONE: America/Bogota
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      EXECUTIONS_PROCESS: main
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - helpdesk_net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── API NestJS ────────────────────────────────────────────────────────────────
  api:
    image: helpdesk/api:latest
    container_name: helpdesk_api
    restart: always
    env_file: ../../.env
    expose:
      - "3000"
    networks:
      - helpdesk_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G

  # ── Web React/Vite ────────────────────────────────────────────────────────────
  web:
    image: helpdesk/web:latest
    container_name: helpdesk_web
    restart: always
    expose:
      - "80"
    networks:
      - helpdesk_net
    depends_on:
      - api

  # ── Nginx (reverse proxy prod) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: helpdesk_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    networks:
      - helpdesk_net
    depends_on:
      - api
      - web
